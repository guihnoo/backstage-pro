<html lang="pt-BR" class="dark">

    <meta charset="UTF-8" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <meta name="theme-color" content="#050609" />

    <title>Backstage Pro - Gestão de Eventos e Finanças</title>
  <script>
    // Quando o service worker atualiza (skipWaiting+clientsClaim), força reload da página.
    // Roda antes do React — funciona mesmo com tela preta/crash do JS.
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.ready.then(function(reg) { reg.update(); });
      navigator.serviceWorker.addEventListener('controllerchange', function() {
        window.location.reload();
      });
    }
  </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
