<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Backstage Pro">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0E1A"/>
      <stop offset="100%" stop-color="#050609"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#A64AFF"/>
      <stop offset="45%" stop-color="#6B3FD4"/>
      <stop offset="100%" stop-color="#00D9FF"/>
    </linearGradient>
    <linearGradient id="glow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#A64AFF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#00D9FF" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <ellipse cx="256" cy="200" rx="180" ry="120" fill="url(#glow)"/>
  <!-- Frequency rings — palco / som / energia -->
  <g fill="none" stroke="url(#wave)" stroke-linecap="round" opacity="0.92">
    <ellipse cx="256" cy="248" rx="168" ry="72" stroke-width="2.2" opacity="0.35"/>
    <ellipse cx="256" cy="248" rx="142" ry="60" stroke-width="2.4" opacity="0.5"/>
    <ellipse cx="256" cy="248" rx="116" ry="48" stroke-width="2.6" opacity="0.65"/>
    <ellipse cx="256" cy="248" rx="90" ry="36" stroke-width="2.8" opacity="0.8"/>
    <ellipse cx="256" cy="248" rx="64" ry="24" stroke-width="3" opacity="0.95"/>
  </g>
  <!-- Spotlight beams -->
  <path d="M256 120 L196 320 L256 300 Z" fill="#A64AFF" opacity="0.12"/>
  <path d="M256 120 L316 320 L256 300 Z" fill="#00D9FF" opacity="0.1"/>
  <!-- Lettermark -->
  <text
    x="256"
    y="278"
    text-anchor="middle"
    font-family="Archivo, system-ui, sans-serif"
    font-size="148"
    font-weight="800"
    fill="#FFFFFF"
    filter="url(#soft)"
  >B</text>
</svg>
