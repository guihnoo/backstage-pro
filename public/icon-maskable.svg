<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Backstage Pro">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0E1A"/>
      <stop offset="100%" stop-color="#050609"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#A64AFF"/>
      <stop offset="100%" stop-color="#00D9FF"/>
    </linearGradient>
  </defs>
  <!-- Full bleed for Android maskable safe zone (~80% center) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <g fill="none" stroke="url(#wave)" stroke-linecap="round" transform="translate(0, 20)">
    <ellipse cx="256" cy="256" rx="150" ry="64" stroke-width="2.5" opacity="0.45"/>
    <ellipse cx="256" cy="256" rx="120" ry="50" stroke-width="2.8" opacity="0.65"/>
    <ellipse cx="256" cy="256" rx="90" ry="36" stroke-width="3" opacity="0.85"/>
    <ellipse cx="256" cy="256" rx="58" ry="22" stroke-width="3.2"/>
  </g>
  <text
    x="256"
    y="292"
    text-anchor="middle"
    font-family="Archivo, system-ui, sans-serif"
    font-size="132"
    font-weight="800"
    fill="#FFFFFF"
  >B</text>
</svg>
